name: Sync IRONBOUND.md to Agent Files

on:
  push:
    branches: [main]
    paths:
      - 'IRONBOUND.md'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync IRONBOUND.md to agent files
        run: |
          cp IRONBOUND.md CLAUDE.md
          cp IRONBOUND.md GEMINI.md
          cp IRONBOUND.md AGENTS.md
          cp IRONBOUND.md .windsurfrules
          cp IRONBOUND.md .clinerules

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CLAUDE.md GEMINI.md AGENTS.md .windsurfrules .clinerules
          git commit -m "sync: update agent files from IRONBOUND.md"
          git push
